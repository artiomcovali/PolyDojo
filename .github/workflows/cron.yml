name: Settle rounds

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure current round exists
        run: |
          curl -fsS -X POST \
            --max-time 90 \
            "${{ secrets.APP_URL }}/api/rounds/ensure"

      - name: Resolve due rounds
        run: |
          curl -fsS -X POST \
            --max-time 90 \
            "${{ secrets.APP_URL }}/api/rounds/resolve"
